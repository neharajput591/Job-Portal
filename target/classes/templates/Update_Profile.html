<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile | Recruitify</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Icon CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- AOS CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">

    <!-- Global Styles -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <!-- Page Specific Styles -->
    <link rel="stylesheet" th:href="@{/css/updateProfileStyle.css}">
</head>

<body>

    <!-- Header (Recruitify Theme) -->
    <header id="mainHeader" class="page-header">
        <div class="logo">
            <i class="fa-solid fa-users-viewfinder"></i> Recruitify
        </div>
        <nav id="nav" class="auth-buttons">
            <a th:href="@{/Candidate/candidateHome}" class="commonBtn" style="text-decoration: none;">
                <i class="fa-solid fa-house-user"></i> Home
            </a>
        </nav>
    </header>

    <div class="container">

        <!-- Update Profile Card -->
        <div class="card" data-aos="fade-up">
            
            <div class="profile-img-container">
                <img th:src="@{'/profilePic/' + ${candidate.profilepic}}" class="profile-img" alt="Profile Picture">
            </div>

            <h2 class="title" data-aos="zoom-in">Update Your Profile</h2>

            <form th:action="@{/Candidate/candidate_profile12}" th:object="${candidate}" method="post" enctype="multipart/form-data">

                <input type="text" th:field="*{idUser}" hidden>

                <div class="form-grid">

                    <div class="input-group" data-aos="fade-right">
                        <label><i class="fa-solid fa-envelope"></i> Email Address</label>
                        <input type="email" th:field="*{email}" placeholder="yourname@example.com">
                    </div>

                    <div class="input-group" data-aos="fade-left">
                        <label><i class="fa-solid fa-image"></i> Profile Photo</label>
                        <input type="file" name="pic">
                    </div>

                    <div class="input-group" data-aos="fade-right">
                        <label><i class="fa-solid fa-user"></i> Full Name</label>
                        <input type="text" th:field="*{name}" required placeholder="Enter your full name">
                    </div>

                    <div class="input-group" data-aos="fade-left">
                        <label><i class="fa-solid fa-calendar-days"></i> Age</label>
                        <input type="number" th:field="*{age}" placeholder="Your age">
                    </div>

                    <div class="input-group" data-aos="fade-right">
                        <label><i class="fa-solid fa-gears"></i> Skills</label>
                        <input type="text" th:field="*{skills}" placeholder="e.g. Java, Python, React">
                    </div>

                    <div class="input-group" data-aos="fade-left">
                        <label><i class="fa-solid fa-city"></i> City</label>
                        <input type="text" th:field="*{city}" placeholder="Your city">
                    </div>

                    <div class="input-group" data-aos="fade-right">
                        <label><i class="fa-solid fa-map-location-dot"></i> State</label>
                        <input type="text" th:field="*{state}" placeholder="Your state">
                    </div>

                    <div class="input-group" data-aos="fade-left">
                        <label><i class="fa-solid fa-earth-americas"></i> Country</label>
                        <input type="text" th:field="*{country}" placeholder="Your country">
                    </div>

                    <div class="input-group" data-aos="fade-right">
                        <label><i class="fa-solid fa-phone"></i> Contact Number</label>
                        <input type="number" th:field="*{contact}" placeholder="Your contact number">
                    </div>

                    <div class="input-group" data-aos="fade-left">
                        <label><i class="fa-solid fa-briefcase"></i> Experience (Years)</label>
                        <input type="number" th:field="*{experience}" placeholder="Total years of experience">
                    </div>

                    <div class="input-group" data-aos="fade-right">
                        <label><i class="fa-solid fa-building"></i> Company Name</label>
                        <input type="text" th:field="*{companyName}" placeholder="Your current/last company">
                    </div>

                    <div class="input-group" data-aos="fade-left">
                        <label><i class="fa-solid fa-graduation-cap"></i> Education</label>
                        <input type="text" th:field="*{education}" placeholder="Highest qualification">
                    </div>

                    <div class="input-group full" data-aos="fade-up">
                        <label><i class="fa-solid fa-circle-info"></i> About You</label>
                        <textarea th:field="*{about}" rows="4" placeholder="Tell us about yourself..."></textarea>
                    </div>

                </div>

                <button type="submit" class="btn" onclick="updateSuccess()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Save Profile Changes
                </button>

            </form>
        </div>

        <!-- Resume Upload Card -->
        <div class="card resume-card" data-aos="fade-up">

            <h2 data-aos="zoom-in"><i class="fa-solid fa-file-pdf"></i> Manage Resume</h2>

            <!-- Existing Resume Badge -->
            <div th:if="${candidate.resume != null}" class="current-resume" data-aos="fade-in">
                <p>
                    <i class="fa-solid fa-check-double"></i> Current Resume: 
                    <a th:href="@{'/uploads/' + ${candidate.resume}}" target="_blank">
                        View Uploaded Resume <i class="fa-solid fa-external-link"></i>
                    </a>
                </p>
            </div>

            <form th:action="@{/Candidate/uploadResume}" method="post" enctype="multipart/form-data">
                <div class="input-group">
                    <label>Upload New Resume (PDF only)</label>
                    <input type="file" name="resume" accept=".pdf" data-aos="fade-up">
                </div>

                <p class="hint">
                    <i class="fa-solid fa-circle-exclamation"></i> Only PDF files are allowed. Max size: 1 MB.
                </p>

                <br>

                <button type="submit" class="btn" style="max-width: 300px; margin: auto;" onclick="resumesuccess()">
                    <i class="fa-solid fa-upload"></i> Upload Resume
                </button>
            </form>

        </div>

    </div>

    <!-- AOS JS -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>
        // Initialize AOS
        AOS.init({
            duration: 1000,
            once: true,
            offset: 100
        });

        // Navbar Scroll Effect
        window.onscroll = () => {
            const header = document.getElementById("mainHeader");
            if (window.scrollY > 50) {
                header.classList.add("fixed");
            } else {
                header.classList.remove("fixed");
            }
        };

        function updateSuccess(){
            alert("Profile Updated Successfully! 🎉✨");
        }

        function resumesuccess(){
            alert("Resume Uploaded Successfully! 🎉✨ ");
        }
    </script>

</body>

</html>
