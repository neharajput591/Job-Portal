<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Profile Update</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            min-height: 100vh;
        }

        /* HEADER */

        .header {
            display: flex;
            align-items: center;
            padding: 20px 60px;
            background: linear-gradient(135deg, #1f4e79, #4db6ac);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: 600;
        }

        .logo span {
            font-size: 30px;
            margin-right: 10px;
        }

        /* MAIN */

        .container {
            max-width: 900px;
            margin: auto;
            padding: 50px 20px;
        }

        /* CARD */

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.18);
        }

        /* TITLE */

        .title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 26px;
            color: #333;
        }

        /* GRID */

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
        }

        /* INPUT GROUP */

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 13px;
            margin-bottom: 6px;
            color: #555;
            font-weight: 500;
        }

        .input-group input,
        .input-group textarea {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            background: #f9fafc;
            transition: 0.3s;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #4db6ac;
            box-shadow: 0 0 8px rgba(77, 182, 172, 0.3);
            background: white;
        }

        /* TEXTAREA FULL WIDTH */

        .full {
            grid-column: 1/3;
        }

        /* BUTTON */

        .btn {
            margin-top: 25px;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(46, 204, 113, 0.4);
        }

        /* MOBILE */

        @media(max-width:768px) {

            .form-grid {
                grid-template-columns: 1fr;
            }

            .full {
                grid-column: 1;
            }

            .header {
                padding: 15px 20px;
            }

        }

        .profile-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
margin-bottom:20px;
border:4px solid #4db6ac;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}
    </style>

</head>

<body>

    <div class="header">
        <div class="logo">
            <span>👜</span> JobHub
        </div>
    </div>

    <div class="container">

        <div class="card">

            <img th:src="@{'/profilePic/' + ${recruiter.profilepic}}" class="profile-img">


            <h2 class="title">Recruiter Profile</h2>

            <form th:action="@{/Recruiter/formData}" method="post" th:object="${recruiter}"
                enctype="multipart/form-data">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Email</label>
                        <input type="text" th:field="*{email}">
                    </div>

                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" th:field="*{name}">
                    </div>

                    <div class="input-group">
                        <label>Company Name</label>
                        <input type="text" th:field="*{companyName}">
                    </div>
                    
                    <div class="input-group">
                        <label>Company Address</label>
                        <input type="text" th:field="*{companyAddress}">
                    </div>

                    <div class="input-group">
                        <label>Your Designation</label>
                        <input type="text" th:field="*{position}">
                    </div>

                    <div class="input-group">
                        <label>Profile Picture</label>
                        <input type="file" name="pic">
                    </div>

                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" th:field="*{age}">
                    </div>

                    <div class="input-group">
                        <label>Skills</label>
                        <input type="text" th:field="*{skills}">
                    </div>

                    <div class="input-group">
                        <label>City</label>
                        <input type="text" th:field="*{city}">
                    </div>

                    <div class="input-group">
                        <label>State</label>
                        <input type="text" th:field="*{state}">
                    </div>

                    <div class="input-group">
                        <label>Country</label>
                        <input type="text" th:field="*{country}">
                    </div>

                    <div class="input-group">
                        <label>Contact</label>
                        <input type="number" th:field="*{contact}">
                    </div>

                    
                    <div class="input-group">
                        <label>Education</label>
                        <input type="text" th:field="*{education}">
                    </div>
                    
                    <div class="input-group">
                        <label>Experience</label>
                        <input type="number" th:field="*{experience}">
                    </div>
                    
                    <div class="input-group full">
                        <label>About</label>
                        <textarea rows="4" th:field="*{about}"></textarea>
                    </div>

                    <!-- <div class="input-group">
                        <label>Company Address</label>
                        <input type="text" th:field="*{companyAddress}">
                    </div> -->
<!-- 
                    <div class="input-group">
                        <label>Company KYC</label>
                        <input type="file" name="kyc">
                    </div> -->

                    <!-- <div class="input-group">
                        <label>Your Designation</label>
                        <input type="text" th:field="*{position}">
                    </div> -->

                    <!-- <div class="input-group">
                        <label>Profile Picture</label>
                        <input type="file" name="pic">
                    </div> -->

                </div>

                <button type="submit" class="btn">Save Profile</button>

            </form>

        </div>

    </div>

            <!-- RESUME UPLOAD -->

        <div class="card resume-card">

            <h2 style="margin-bottom:20px;">Upload Company KYC</h2>

            <form th:action="@{/Recruiter/uploadCompanyKyc}" method="post" enctype="multipart/form-data">

                <input type="file" name="companyKyc" accept=".pdf,.doc,.docx" required>
                <p style="color: rgb(248, 44, 44); font-size: small;">Please upload the document in PDF format only. The file size must not exceed 1 MB. </p>

                <br><br>

                <button type="submit" class="btn">Upload Company KYC</button>

            </form>

        </div>


</body>

</html>
