<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Profile | Recruitify</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Icon CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- AOS CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">

    <!-- Separate CSS -->
    <link rel="stylesheet" th:href="@{/css/viewRecruiterProfileStyle.css}">
</head>

<body>

    <!-- Header -->
    <header id="mainHeader">
        <div class="logo">
            <i class="fa-solid fa-users-viewfinder"></i> Recruitify
        </div>
        <nav class="auth-buttons">
            <a th:href="@{/admin_home}" class="commonBtn">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </a>
        </nav>
    </header>

    <div class="container">
        <div th:each="recruiter:${recruiterProfile}" class="card" data-aos="fade-up">

            <!-- Profile Image -->
            <div class="profile-img-container" data-aos="zoom-in">
                <img th:src="@{'/profilePic/' + ${recruiter.profilepic}}" class="profile-img" alt="Recruiter Profile">
            </div>

            <h1 class="title" th:text="${recruiter.name}" data-aos="fade-down"></h1>

            <div class="info-grid">

                <div class="info-item" data-aos="fade-right">
                    <label><i class="fa-solid fa-envelope"></i> Email Address</label>
                    <span class="value" th:text="${recruiter.email}"></span>
                </div>

                <div class="info-item" data-aos="fade-left">
                    <label><i class="fa-solid fa-user-check"></i> Verification STATUS</label>
                    <span class="value">
                        <span th:text="${recruiter.verify}" 
                              th:class="${recruiter.verify == 'verified' ? 'status-badge status-verified' : 'status-badge status-pending'}">
                        </span>
                    </span>
                </div>

                <div class="info-item" data-aos="fade-right">
                    <label><i class="fa-solid fa-phone"></i> Contact Number</label>
                    <span class="value" th:text="${recruiter.contact}"></span>
                </div>

                <div class="info-item" data-aos="fade-left">
                    <label><i class="fa-solid fa-calendar-days"></i> Age</label>
                    <span class="value" th:text="${recruiter.age + ' Years'}"></span>
                </div>

                <div class="info-item" data-aos="fade-right">
                    <label><i class="fa-solid fa-graduation-cap"></i> Education</label>
                    <span class="value" th:text="${recruiter.education}"></span>
                </div>

                <div class="info-item" data-aos="fade-left">
                    <label><i class="fa-solid fa-briefcase"></i> Position</label>
                    <span class="value" th:text="${recruiter.position}"></span>
                </div>

                <div class="info-item" data-aos="fade-right">
                    <label><i class="fa-solid fa-star"></i> Experience</label>
                    <span class="value" th:text="${recruiter.experience + ' Years'}"></span>
                </div>

                <div class="info-item" data-aos="fade-left">
                    <label><i class="fa-solid fa-gears"></i> Skills</label>
                    <span class="value" th:text="${recruiter.skills}"></span>
                </div>

                <div class="info-item" data-aos="fade-right">
                    <label><i class="fa-solid fa-building"></i> Company Name</label>
                    <span class="value" th:text="${recruiter.companyName}"></span>
                </div>

                <div class="info-item" data-aos="fade-left">
                    <label><i class="fa-solid fa-location-dot"></i> City</label>
                    <span class="value" th:text="${recruiter.city}"></span>
                </div>

                <div class="info-item full" data-aos="fade-up">
                    <label><i class="fa-solid fa-map-location-dot"></i> Company Address</label>
                    <span class="value" th:text="${recruiter.companyAddress + ', ' + recruiter.state + ', ' + recruiter.country}"></span>
                </div>

                <div class="info-item full" data-aos="fade-up">
                    <label><i class="fa-solid fa-circle-info"></i> About</label>
                    <span class="value" th:text="${recruiter.about}"></span>
                </div>

                <div class="info-item full" data-aos="fade-up">
                    <label><i class="fa-solid fa-calendar-plus"></i> Account Created</label>
                    <span class="value" th:text="${recruiter.createdDate}"></span>
                </div>

            </div>
        </div>
    </div>

    <!-- AOS JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true,
            offset: 100
        });

        window.onscroll = () => {
            const header = document.getElementById("mainHeader");
            if (window.scrollY > 50) header.classList.add("fixed");
            else header.classList.remove("fixed");
        };
    </script>
</body>

</html>
