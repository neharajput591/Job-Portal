<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Recruitify</title>
    <!-- icon cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- css -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .register-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 40px 20px;
        }

        .register-card {
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            z-index: 10;
        }

        .register-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .register-subtitle {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: var(--primary-color);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            margin-top: 5px;
        }

        .radio-option {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background-color: #f9f9f9;
            font-weight: 500;
            color: #444;
        }

        .radio-option:hover {
            border-color: var(--primary-color);
            background-color: #f0fdf4; /* Light green tint */
        }
        
        .radio-option input[type="radio"] {
            accent-color: var(--primary-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .register-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary-color);
            color: var(--white);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .register-button:hover {
            background: #3e8e41;
        }

        .login-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }

        .login-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .alert-error {
            color: #ecc94b;
            background-color: rgba(236, 72, 153, 0.1);
            border: 1px solid rgba(236, 72, 153, 0.3);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="main" id="home">
        <div class="overlay">

            <!-- header -->
            <header id="mainHeader">
                <div class="container">
                    <div class="logo">
                        <i class="fa-solid fa-users-viewfinder"></i>Recruitify
                    </div>
                    <nav id="nav">
                        <a th:href="@{/}">Home</a>
                        <a th:href="@{/#findJobs}">Find Jobs</a>
                        <a th:href="@{/#jobCategories}">Job Categories</a>
                        <a th:href="@{/#aboutUs}">About Us</a>
                        <a th:href="@{/#footer}">Contact</a>
                    </nav>
                    <div class="auth-buttons">
                        <a th:href="@{/login}"><button class="commonBtn"><i class="fa-solid fa-user"></i> Login</button></a>
                        <a th:href="@{/register}"><button class="commonBtn"><i class="fa-solid fa-right-to-bracket"></i> Register</button></a>
                    </div>
                    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
                </div>
            </header>

            <!-- register section -->
            <div class="register-section">
                <div class="register-card">
                    <h2 class="register-title">Create Account</h2>
                    <p class="register-subtitle">Join Recruitify and find your dream career</p>

                    <form th:action="@{/RegisterData}" th:object="${userdata}" method="post">

                        <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}">
                        </div>

                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" name="email" required>

                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" name="password" required>

                        <label class="form-label">I am a...</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="role" value="Candidate" required checked> Candidate
                            </label>

                            <label class="radio-option">
                                <input type="radio" name="role" value="Recruiter" required> Recruiter
                            </label>
                        </div>

                        <button type="submit" class="register-button">Create Account</button>

                        <p class="login-text">
                            Already have an account?
                            <a th:href="@{/login}" class="login-link">Sign in</a>
                        </p>

                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- custom js -->
    <script th:src="@{/js/custom.js}"></script>
</body>

</html>
