<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post A Job</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            min-height: 100vh;
        }

        /* HEADER */

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: linear-gradient(135deg, #1f4e79, #4db6ac);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
        }

        /* CONTAINER */

        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        /* FORM CARD */

        .form-card {
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .form-card h1 {
            margin-bottom: 25px;
            color: #333;
            text-align: center;
        }

        /* FORM GRID */

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* FULL WIDTH */

        .full {
            grid-column: 1 / -1;
        }

        /* LABEL */

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #444;
        }

        /* INPUT */

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #4db6ac;
            box-shadow: 0 0 4px rgba(77, 182, 172, 0.4);
        }

        /* BUTTON */

        .submit-btn {
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(135deg, #1f4e79, #4db6ac);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* MOBILE */

        @media(max-width:700px) {

            .form-grid {
                grid-template-columns: 1fr;
            }

        }
    </style>

</head>

<body>

    <!-- HEADER -->

    <div class="header">
        <div class="logo">👜 JobHub Recruiter</div>
    </div>

    <div class="container">

        <div class="form-card">

            <h1>Post A Job</h1>

            <form th:action="@{/Recruiter/jobDetails}" method="post" th:object="${newPost}">

                <div class="form-grid">

                    <div>
                        <label>Job Title</label>
                        <input type="text" name="title">
                    </div>

                    <div>
                        <label>Company Name</label>
                        <input type="text" name="companyName" th:field="*{companyName}" readonly>
                    </div>

                    <div>
                        <label>Experience Required</label>
                        <input type="number" name="experience_required">
                    </div>

                    <div>
                        <label>Location</label>
                        <input type="text" name="location">
                    </div>

                    <div>
                        <label>Category</label>
                        <input type="text" name="category">
                    </div>

                    <div>
                        <label>Salary</label>
                        <input type="number" name="salary">
                    </div>

                    <div>
                        <label>Contact</label>
                        <input type="number" name="contact" th:field="*{contact}">
                    </div>

                    <div>
                        <label>Skills Required</label>
                        <input type="text" name="skillsRequired">
                    </div>

                    <div>
                        <label>Qualification</label>
                        <input type="text" name="qualification">
                    </div>

                    <div class="full">
                        <label>Job Description</label>
                        <textarea name="job_description" rows="4"></textarea>
                    </div>

                    <input type="hidden" name="recruiterId" th:field="*{recruiterId}" readonly>

                </div>

                <button type="submit" class="submit-btn">Post Job</button>

            </form>

        </div>

    </div>

</body>

</html>
