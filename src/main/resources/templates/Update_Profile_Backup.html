        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            min-height: 100vh;
        }

        /* HEADER */

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: linear-gradient(135deg, #1f4e79, #4db6ac);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .logo span {
            font-size: 30px;
            margin-right: 12px;
        }

        /* MAIN CONTAINER */

        .container {
            max-width: 950px;
            margin: auto;
            padding: 50px 20px;
        }

        /* GLASS CARD */

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            margin-bottom: 35px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.18);
        }

        /* PROFILE IMAGE */

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: auto;
            margin-bottom: 20px;
            border: 5px solid #4db6ac;
            box-shadow: 0 0 20px rgba(77, 182, 172, 0.5);
            transition: 0.4s;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        /* TITLE */

        .title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 26px;
            font-weight: 600;
        }

        /* GRID */

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
        }

        /* INPUT GROUP */

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 13px;
            margin-bottom: 6px;
            color: #555;
            font-weight: 500;
        }

        .input-group input {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: 0.3s;
            background: #f9fafc;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4db6ac;
            box-shadow: 0 0 8px rgba(77, 182, 172, 0.3);
            background: white;
        }

        /* FULL WIDTH */

        .full {
            grid-column: 1/3;
        }

        /* BUTTON */

        .btn {
            margin-top: 25px;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(46, 204, 113, 0.4);
        }

        /* RESUME CARD */

        .resume-card {
            text-align: center;
        }

        .resume-card input {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* SMALL SCREENS */

        @media(max-width:768px) {

            .form-grid {
                grid-template-columns: 1fr;
            }

            .full {
                grid-column: 1;
            }

            .header {
                padding: 15px 20px;
            }

        }
    </style>

</head>

<body>

    <!-- HEADER -->

    <div class="header">

        <div class="logo">
            <span>👜</span> JobHub
        </div>

    </div>

    <div class="container">

        <div class="card">

            <img th:src="@{'/profilePic/' + ${candidate.profilepic}}" class="profile-img">

            <h2 class="title">Update Profile</h2>

            <form th:action="@{/Candidate/candidate_profile12}" th:object="${candidate}" method="post"
                enctype="multipart/form-data">

                <input type="text" th:field="*{idUser}" hidden>

                <div class="form-grid">

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}">
                    </div>

                    <div class="input-group">
                        <label>Profile Photo</label>
                        <input type="file" name="pic">
                    </div>

                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" th:field="*{name}" required>
                    </div>

                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" th:field="*{age}">
                    </div>

                    <div class="input-group">
                        <label>Skills</label>
                        <input type="text" th:field="*{skills}">
                    </div>

                    <div class="input-group">
                        <label>City</label>
                        <input type="text" th:field="*{city}">
                    </div>

                    <div class="input-group">
                        <label>State</label>
                        <input type="text" th:field="*{state}">
                    </div>

                    <div class="input-group">
                        <label>Country</label>
                        <input type="text" th:field="*{country}">
                    </div>

                    <div class="input-group">
                        <label>Contact</label>
                        <input type="number" th:field="*{contact}">
                    </div>

                    <div class="input-group">
                        <label>Experience (Years)</label>
                        <input type="number" th:field="*{experience}">
                    </div>

                    <div class="input-group">
                        <label>Company Name</label>
                        <input type="text" th:field="*{companyName}">
                    </div>

                    <div class="input-group">
                        <label>Education</label>
                        <input type="text" th:field="*{education}">
                    </div>

                    <div class="input-group full">
                        <label>About</label>
                        <input type="text" th:field="*{about}">
                    </div>

                </div>

                <button type="submit" class="btn" onclick="updateSuccess()">Save Profile</button>

            </form>

        </div>

        <div class="card resume-card">

    <h2 style="margin-bottom:20px;">Upload Resume</h2>

    <!-- Show existing resume -->
    <div th:if="${candidate.resume != null}">
        <p>
            Current Resume :
            <a th:href="@{'/uploads/' + ${candidate.resume}}" target="_blank">
                View Resume
            </a>
        </p>
    </div>

    <form th:action="@{/Candidate/uploadResume}" method="post" enctype="multipart/form-data">

        <input type="file" name="resume" accept=".pdf">

        <p style="color:red; font-size:small;">
            Please upload the document in PDF format only. The file size must not exceed 1 MB.
        </p>

        <br><br>

        <button type="submit" class="btn" onclick="resumesuccess()">Upload Resume</button>

    </form>

</div>

    </div>

    <script>
        function updateSuccess(){
            alert("Profile Updated Successfully! 🎉✨");
        }

        function resumesuccess(){
            alert("Resume Uploaded Successfully! 🎉✨ ")
        }
    </script>
