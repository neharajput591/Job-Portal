<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER */

.header{
height:80px;
background:linear-gradient(135deg,#4e73df,#224abe);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
}

.header h2{
letter-spacing:1px;
}

.logout-btn{
background:white;
color:#224abe;
border:none;
padding:8px 16px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

/* MAIN CONTAINER */

.container{
padding:30px;
background:#f5f7fb;
min-height:100vh;
}

/* DASHBOARD CARDS */

.cards{
display:flex;
gap:25px;
margin-bottom:30px;
}

.card{
flex:1;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{
color:#555;
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
color:#4e73df;
}

/* TABLE SECTION */

.table-section{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.table-section h2{
margin-bottom:20px;
color:#333;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#4e73df;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

tr:hover{
background:#f1f3ff;
}

/* BUTTONS */

.verify-btn{
background:#28a745;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

.reject-btn{
background:#dc3545;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

.verify-btn:hover{
background:#218838;
}

.reject-btn:hover{
background:#c82333;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<h2>Admin Dashboard</h2>

<button class="logout-btn">Logout</button>

</div>

<!-- MAIN CONTENT -->

<div class="container">

<!-- STATS CARDS -->

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p th:text="${totalUsers}">120</p>
</div>

<div class="card">
<h3>Total Recruiters</h3>
<p th:text="${totalRecruiters}">30</p>
</div>

<div class="card">
<h3>Total Jobs</h3>
<p th:text="${totalJobs}">54</p>
</div>

</div>

<!-- RECRUITER VERIFICATION -->

<div class="table-section">

<h2>Recruiter Verification Requests</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Company</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="rec : ${newRecruiter}">

<td th:text="${rec.name}"></td>

<td th:text="${rec.email}"></td>

<td th:text="${rec.company}"></td>

<td style="color:red;">Pending</td>

<td>

<form th:action="@{/verifyRecruiter}" method="post" style="display:inline">
<input type="hidden" name="id" th:value="${rec.id}">
<button class="verify-btn">Verify</button>
</form>

<form th:action="@{/rejectRecruiter}" method="post" style="display:inline">
<input type="hidden" name="id" th:value="${rec.id}">
<button class="reject-btn">Reject</button>
</form>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
