<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Posted Successfully</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: linear-gradient(135deg, #1f4e79, #4db6ac);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
        }

        /* CENTER CARD */

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background: white;
            padding: 40px 50px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 15px;
            color: #2ecc71;
        }

        .success-card h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .success-card p {
            color: #555;
            margin-bottom: 25px;
        }

        /* BUTTONS */

        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .actions a {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            font-size: 14px;
        }

        .dashboard {
            background: #1f4e79;
        }

        .post {
            background: #4db6ac;
        }

        .view {
            background: #2ecc71;
        }

        .actions a:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <!-- HEADER -->

    <div class="header">
        <div class="logo">👜 JobHub Recruiter</div>
    </div>


    <!-- SUCCESS CONTENT -->

    <div class="container">

        <div class="success-card">

            <div class="success-icon">✅</div>

            <h1>Job Posted Successfully!</h1>

            <p>Your job listing has been published and is now visible to candidates.
                You can manage applications or post another opportunity from your dashboard.</p>

            <div class="actions">

                <a class="dashboard" th:href="@{/recruiter_home}">
                    Go to Dashboard
                </a>

                <a class="post" th:href="@{/Recruiter/postRequest}">
                    Post Another Job
                </a>

                <a class="view" th:href="@{/recruiter_home}">
                    View My Jobs
                </a>

            </div>

        </div>

    </div>

</body>

</html>
