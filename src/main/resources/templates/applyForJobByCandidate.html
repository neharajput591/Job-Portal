<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        body {
            background: #f5f7fb;
        }

        /* HEADER */

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: linear-gradient(135deg, #1f4e79, #4db6ac);
            color: white;
        }

        .header h1 {
            font-weight: 600;
        }

        /* MAIN CONTAINER */

        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            padding: 40px;
        }

        /* APPLY CARD */

        .applyCard {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            width: 500px;
            text-align: center;
        }

        /* TITLE */

        .applyCard h2 {
            margin-bottom: 20px;
            color: #333;
        }

        /* WARNING BOX */

        .warning {
            background: #fff5e6;
            border-left: 5px solid #f39c12;
            padding: 15px;
            border-radius: 8px;
            color: #555;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 22px;
        }

        /* APPLY BUTTON */

        .applyBtn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .applyBtn:hover {
            opacity: 0.9;
        }
    </style>

</head>

<body>

    <div class="header">
        <h1>JobHub</h1>
    </div>

    <div class="main">

        <div class="applyCard">

            <h2>Apply for this Job</h2>

            <div class="warning">
                Application will be sent according to your profile.
                If your profile data is incorrect please update it before applying.
            </div>

            <form th:action="@{/Apply/bycandidate}" method="post" th:object="${job}">

                <!-- Future hidden fields or inputs can go here -->

                <button type="submit" class="applyBtn">
                    Submit Application
                </button>

            </form>

        </div>

    </div>

</body>

</html>
